<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Kasrga Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #1e1f22; color: #dbdee1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .sidebar-icon { @apply w-12 h-12 rounded-[24px] bg-[#313338] text-[#23a559] flex items-center justify-center transition-all duration-300 hover:rounded-[15px] hover:bg-[#23a559] hover:text-white cursor-pointer mb-2; }
        .sidebar-icon.active { @apply rounded-[15px] bg-[#5865f2] text-white; }
        .voice-active { @apply border-2 border-green-500 animate-pulse; }
        .modal-overlay { background: rgba(0,0,0,0.92); position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .input-dark { @apply w-full bg-[#1e1f22] p-3 rounded-lg text-white outline-none border border-transparent focus:border-[#5865f2] transition-all; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState("friends");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null);
            const [inVoice, setInVoice] = useState(false);
            
            // UI States
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [friendName, setFriendName] = useState("");
            const [serverInput, setServerInput] = useState({ name: "", icon: "" });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const userRef = db.collection("users").doc(u.uid);
                        const snap = await userRef.get();
                        if (snap.exists) {
                            setUserData(snap.data());
                        } else {
                            const newProfile = { nickname: u.email.split('@')[0], photo: "", friends: [], banned: false };
                            await userRef.set(newProfile);
                            setUserData(newProfile);
                        }
                        setUser(u);
                        // Sunucuları çek
                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(s => setServers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = () => auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Giriş Hatası!"));

            const addFriend = async () => {
                const friendSnap = await db.collection("users").where("nickname", "==", friendName).get();
                if (friendSnap.empty) return alert("Kullanıcı bulunamadı!");
                await db.collection("users").doc(user.uid).update({
                    friends: firebase.firestore.FieldValue.arrayUnion(friendName)
                });
                alert("Arkadaş eklendi!");
                setModal(null);
            };

            const createServer = async () => {
                await db.collection("servers").add({
                    name: serverInput.name,
                    icon: serverInput.icon,
                    owner: user.uid,
                    members: [user.uid]
                });
                setModal(null);
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-[#5865f2] font-black text-2xl animate-bounce">TALKHUB...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22]">
                    <div className="bg-[#313338] p-10 rounded-2xl w-[400px] shadow-2xl border border-white/5">
                        <h2 className="text-white text-3xl font-black mb-8 text-center uppercase tracking-tighter">TalkHub Giriş</h2>
                        <input className="input-dark mb-4" placeholder="E-posta" onChange={e => setEmail(e.target.value)} />
                        <input type="password" className="input-dark mb-6" placeholder="Şifre" onChange={e => setPass(e.target.value)} />
                        <button onClick={handleLogin} className="w-full bg-[#5865f2] py-3 rounded-lg font-bold text-white hover:bg-[#4752c4] transition">Giriş Yap</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full select-none">
                    {/* SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 shrink-0">
                        <div onClick={() => setActiveTab("friends")} className={`sidebar-icon ${activeTab === "friends" ? "active" : ""}`}>👥</div>
                        <div className="w-8 h-[2px] bg-[#35363c] my-2"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} 
                                 className={`sidebar-icon ${activeTab === s.id ? "active" : ""}`}
                                 style={{ backgroundImage: `url(${s.icon})`, backgroundSize: 'cover' }}>
                                {!s.icon && s.name[0]}
                            </div>
                        ))}
                        <div onClick={() => setModal("addServer")} className="sidebar-icon">+</div>
                    </div>

                    {/* KANAL / ARKADAŞ LİSTESİ */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 border-b border-black/20 flex items-center px-4 font-bold text-white">
                            {activeTab === "friends" ? "TalkHub" : servers.find(s => s.id === activeTab)?.name}
                        </div>
                        <div className="flex-1 p-3 overflow-y-auto">
                            {activeTab === "friends" ? (
                                <div className="space-y-4">
                                    <button onClick={() => setModal("addFriend")} className="w-full bg-[#248046] text-white text-xs font-bold py-2 rounded">Arkadaş Ekle</button>
                                    <div className="text-xs font-bold text-gray-400 uppercase">Arkadaşların</div>
                                    {userData?.friends?.map(f => (
                                        <div key={f} className="flex items-center space-x-2 p-2 hover:bg-[#35373c] rounded-lg cursor-pointer">
                                            <div className="w-8 h-8 rounded-full bg-[#5865f2]"></div>
                                            <span className="text-sm text-gray-300 font-medium">{f}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="text-xs font-bold text-gray-400 uppercase">Ses Kanalları</div>
                                    <div onClick={() => setInVoice(!inVoice)} className="p-2 hover:bg-[#35373c] rounded text-gray-300 flex items-center justify-between cursor-pointer">
                                        <span>🔊 Genel Sesli</span>
                                    </div>
                                    {inVoice && (
                                        <div className="pl-4 flex items-center space-x-2">
                                            <div className={`w-6 h-6 rounded-full bg-orange-500 ${inVoice ? 'voice-active' : ''}`}></div>
                                            <span className="text-xs text-white">{userData?.nickname}</span>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        {/* KULLANICI ALTI */}
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-cover bg-center" style={{backgroundImage: `url(${userData?.photo || 'https://via.placeholder.com/32'})`}}></div>
                                <span className="text-xs font-bold text-white">{userData?.nickname}</span>
                            </div>
                            <div className="flex space-x-2 text-gray-400">
                                <span className="cursor-pointer hover:text-white" onClick={() => setModal("settings")}>⚙️</span>
                            </div>
                        </div>
                    </div>

                    {/* ANA MESAJLAŞMA / SESLİ PANEL */}
                    <div className="flex-1 bg-[#313338] flex flex-col">
                        <div className="h-12 border-b border-black/20 flex items-center px-6 font-bold text-white shadow-md">
                            {activeTab === "friends" ? "🤝 Arkadaşlık Merkezi" : "# genel-sohbet"}
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center">
                            {inVoice ? (
                                <div className="text-center">
                                    <div className="w-32 h-32 rounded-full border-4 border-green-500 animate-pulse mx-auto mb-4 flex items-center justify-center overflow-hidden bg-black">
                                        <img src={userData?.photo || 'https://via.placeholder.com/128'} />
                                    </div>
                                    <h2 className="text-white text-xl font-bold">Sesli Görüşmedesin</h2>
                                    <button onClick={() => setInVoice(false)} className="mt-6 bg-red-600 text-white px-8 py-2 rounded-full font-bold hover:bg-red-700 transition">Bağlantıyı Kes</button>
                                </div>
                            ) : (
                                <div className="text-center opacity-50">
                                    <h2 className="text-gray-400 text-2xl font-black">TalkHub'a Hoş Geldin</h2>
                                    <p>Sohbete başlamak için bir arkadaşını seç veya bir sunucuya dal.</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* MODALLAR */}
                    {modal === "addServer" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-8 rounded-xl w-96" onClick={e => e.stopPropagation()}>
                                <h3 className="text-white text-xl font-bold mb-6">Sunucu Kur</h3>
                                <input className="input-dark mb-4" placeholder="Sunucu Adı" onChange={e => setServerInput({...serverInput, name: e.target.value})} />
                                <input className="input-dark mb-6" placeholder="İkon URL" onChange={e => setServerInput({...serverInput, icon: e.target.value})} />
                                <button onClick={createServer} className="w-full bg-[#23a559] py-3 rounded-lg font-bold text-white hover:bg-[#1a7a42]">Oluştur</button>
                            </div>
                        </div>
                    )}

                    {modal === "addFriend" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-8 rounded-xl w-96" onClick={e => e.stopPropagation()}>
                                <h3 className="text-white text-xl font-bold mb-6">Arkadaş Ekle</h3>
                                <input className="input-dark mb-6" placeholder="Arkadaşının Kullanıcı Adı" onChange={e => setFriendName(e.target.value)} />
                                <button onClick={addFriend} className="w-full bg-[#5865f2] py-3 rounded-lg font-bold text-white">İstek Gönder</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
