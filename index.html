<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Discord Clone</title>
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve Babel (Kodun çalışması için) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Discord scrollbar stili */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2e3338; }
        ::-webkit-scrollbar-thumb { background: #202225; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const TalkHub = () => {
            const [messages, setMessages] = useState([
                { id: 1, user: "YazılımcıKanka", text: "TalkHub'a hoş geldin! Node.js olmadan da hallettik bak. 😎", time: "16:20" }
            ]);
            const [inputText, setInputText] = useState("");

            const handleSendMessage = (e) => {
                if (e.key === 'Enter' && inputText.trim() !== "") {
                    const newMessage = {
                        id: messages.length + 1,
                        user: "Sen",
                        text: inputText,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };
                    setMessages([...messages, newMessage]);
                    setInputText("");
                }
            };

            return (
                <div className="flex h-screen w-full bg-[#36393f] text-gray-100 overflow-hidden font-sans">
                    
                    {/* 1. SÜTUN: SUNUCU LİSTESİ */}
                    <div className="w-20 bg-[#202225] flex flex-col items-center py-3 space-y-2 flex-shrink-0">
                        <div className="w-12 h-12 bg-[#5865f2] rounded-2xl flex items-center justify-center cursor-pointer hover:rounded-xl transition-all duration-200 shadow-lg">
                            <span className="font-bold">TH</span>
                        </div>
                        <div className="w-8 h-0.5 bg-[#36393f] rounded-full my-1"></div>
                        <div className="w-12 h-12 bg-[#36393f] rounded-3xl flex items-center justify-center cursor-pointer hover:bg-[#5865f2] hover:rounded-xl transition-all duration-200">S1</div>
                        <div className="w-12 h-12 bg-[#36393f] rounded-3xl flex items-center justify-center cursor-pointer hover:bg-[#3ec44f] hover:rounded-xl transition-all duration-200 text-2xl">+</div>
                    </div>

                    {/* 2. SÜTUN: KANAL LİSTESİ */}
                    <div className="w-60 bg-[#2f3136] flex flex-col flex-shrink-0">
                        <div className="h-12 shadow-md flex items-center px-4 font-bold border-b border-[#26272b] z-10">
                            TalkHub Community
                        </div>
                        <div className="flex-1 p-3 space-y-1">
                            <div className="text-gray-400 text-[11px] font-bold px-2 uppercase mb-1 tracking-wider">Metin Kanalları</div>
                            <div className="bg-[#393c43] px-2 py-1.5 rounded text-white cursor-pointer flex items-center">
                                <span className="text-gray-400 mr-1.5 text-xl">#</span> genel
                            </div>
                            <div className="hover:bg-[#393c43] px-2 py-1.5 rounded text-gray-400 cursor-pointer flex items-center group">
                                <span className="text-gray-400 mr-1.5 text-xl">#</span> <span className="group-hover:text-gray-200">yazılım-sohbet</span>
                            </div>
                        </div>
                    </div>

                    {/* 3. SÜTUN: CHAT ALANI */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <div className="h-12 shadow-md flex items-center px-4 border-b border-[#26272b] font-semibold z-10">
                            <span className="text-gray-400 mr-2 text-xl">#</span> genel
                        </div>

                        {/* Mesaj Akışı */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {messages.map((msg) => (
                                <div key={msg.id} className="flex items-start space-x-4 hover:bg-[#32353b] -mx-4 px-4 py-1 transition-colors">
                                    <div className="w-10 h-10 bg-[#5865f2] rounded-full flex-shrink-0 flex items-center justify-center font-bold">
                                        {msg.user[0]}
                                    </div>
                                    <div className="min-w-0">
                                        <div className="flex items-center space-x-2">
                                            <span className="font-medium text-white hover:underline cursor-pointer">{msg.user}</span>
                                            <span className="text-[10px] text-gray-400">{msg.time}</span>
                                        </div>
                                        <p className="text-[#dcddde] break-words">{msg.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Input Alanı */}
                        <div className="p-4 bg-[#36393f]">
                            <div className="bg-[#40444b] rounded-lg px-4 py-2.5">
                                <input 
                                    type="text" 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    onKeyDown={handleSendMessage}
                                    placeholder="#genel kanalına mesaj gönder" 
                                    className="bg-transparent w-full focus:outline-none text-gray-200 placeholder-[#72767d] text-[15px]"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
