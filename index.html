<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl cursor-pointer flex items-center justify-center transition-all duration-200 hover:rounded-xl hover:bg-[#5865f2] hover:text-white relative bg-cover bg-center; }
        .sidebar-btn.active { @apply rounded-xl bg-[#5865f2] text-white; }
        .sidebar-btn.active::before { content: ""; position: absolute; left: -12px; height: 35px; width: 4px; background: white; border-radius: 0 4px 4px 0; }
        .top-nav-btn { @apply px-2 py-1 rounded hover:bg-[#3f4147] cursor-pointer transition text-gray-400 hover:text-gray-200; }
        .top-nav-btn.active { @apply bg-[#3f4147] text-white; }
        .friend-card:hover { @apply bg-[#393c41] rounded-lg; }
        .th-badge { background: #5865f2; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Public Key buraya çakıldı kanka!
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [isLogin, setIsLogin] = useState(true);
            const [activeTab, setActiveTab] = useState("dm");
            const [friendView, setFriendView] = useState("online");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null);
            const [serverForm, setServerForm] = useState({ name: "", icon: "" });

            const ADMIN_EMAIL = "talkhubofficiall@gmail.com";

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if(u) {
                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(s => setServers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    }
                });
            }, []);

            const handleAuth = async () => {
                try {
                    if(isLogin) {
                        await auth.signInWithEmailAndPassword(email, pass);
                    } else {
                        const res = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(res.user.uid).set({
                            nickname: email.split('@')[0],
                            username: email.split('@')[0],
                            email: email
                        });
                    }
                } catch (e) { alert("Hata: " + e.message); }
            };

            const createServer = async () => {
                if(!serverForm.name) return;
                await db.collection("servers").add({
                    name: serverForm.name,
                    icon: serverForm.icon,
                    owner: user.uid,
                    members: [user.uid],
                    inviteCode: Math.random().toString(36).substring(7).toUpperCase()
                });
                setModal(null);
                setServerForm({ name: "", icon: "" });
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22]">
                    <div className="bg-[#313338] p-8 rounded-lg shadow-xl w-96 text-center">
                        <h2 className="text-2xl font-bold mb-2 text-white">TalkHub'a Giriş Yap</h2>
                        <p className="text-gray-400 text-sm mb-6">Seni tekrar görmek güzel!</p>
                        <input className="w-full bg-[#1e1f22] p-2 rounded mb-4 outline-none text-white" placeholder="E-Posta" onChange={e=>setEmail(e.target.value)} />
                        <input type="password" className="w-full bg-[#1e1f22] p-2 rounded mb-4 outline-none text-white" placeholder="Şifre" onChange={e=>setPass(e.target.value)} />
                        <button onClick={handleAuth} className="w-full bg-[#5865f2] py-2 rounded font-bold text-white">{isLogin ? "Giriş Yap" : "Kayıt Ol"}</button>
                        <p className="text-xs mt-4 text-gray-400 cursor-pointer" onClick={()=>setIsLogin(!isLogin)}>
                            {isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap"}
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* SUNUCU SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 shrink-0">
                        <div onClick={() => setActiveTab("dm")} className={`sidebar-btn ${activeTab === "dm" ? "active" : ""}`}>
                             <img src="https://cdn.discordapp.com/embed/avatars/0.png" className="w-8 h-8 rounded-full" />
                        </div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} className={`sidebar-btn ${activeTab === s.id ? "active" : ""}`}
                                 style={{ backgroundImage: s.icon ? `url(${s.icon})` : 'none' }}>
                                {!s.icon && s.name[0]}
                            </div>
                        ))}
                        <div onClick={() => setModal("create")} className="sidebar-btn text-[#23a559] hover:bg-[#23a559] text-2xl">+</div>
                        {user.email === ADMIN_EMAIL && <div className="sidebar-btn text-xl text-yellow-500">👑</div>}
                    </div>

                    {/* SOL PANEL (DM / KANALLAR) */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 flex items-center px-4 font-bold border-b border-black/20">
                            {activeTab === "dm" ? "Sohbet bul ya da başlat" : servers.find(x => x.id === activeTab)?.name}
                        </div>
                        <div className="flex-1 p-2 overflow-y-auto">
                            {activeTab === "dm" ? (
                                <div className="space-y-1">
                                    <div className="flex items-center p-2 rounded bg-[#3f4147] text-white cursor-pointer">👥 Arkadaşlar</div>
                                    <div className="text-xs font-bold text-gray-400 px-2 py-3 uppercase">Direkt Mesajlar</div>
                                    <div className="flex items-center p-2 friend-card cursor-pointer">
                                        <div className="w-8 h-8 rounded-full bg-blue-500 mr-3"></div>
                                        <span className="text-sm font-medium">DarkMertatom</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-1">
                                    <div className="text-xs font-bold text-gray-400 px-2 mb-2 uppercase">Metin Kanalları</div>
                                    <div className="p-2 rounded bg-[#404249] text-white flex items-center">
                                        <span className="mr-2 text-gray-400 text-xl">#</span> genel
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] relative">
                                    <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#232428]"></div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-center">
                                        <span className="text-xs font-bold text-white">{user.email.split('@')[0]}</span>
                                        {user.email === ADMIN_EMAIL && <span className="th-badge">TH</span>}
                                    </div>
                                    <span className="text-[10px] text-gray-400 font-bold">Çevrimiçi</span>
                                </div>
                            </div>
                            <div className="flex space-x-2 text-gray-400 text-sm">🎙️ 🎧 <span className="cursor-pointer" onClick={() => auth.signOut()}>🚪</span></div>
                        </div>
                    </div>

                    {/* ANA ALAN (ARKADAŞLAR / MESAJLAR) */}
                    <div className="flex-1 bg-[#313338] flex flex-col">
                        <div className="h-12 flex items-center px-4 border-b border-black/20 space-x-4">
                            {activeTab === "dm" && (
                                <>
                                    <div className="font-bold flex items-center mr-4">👥 Arkadaşlar</div>
                                    <div className="w-[1px] h-6 bg-gray-600"></div>
                                    <div onClick={() => setFriendView("online")} className={`top-nav-btn ${friendView === "online" ? "active" : ""}`}>Çevrimiçi</div>
                                    <div onClick={() => setFriendView("all")} className={`top-nav-btn ${friendView === "all" ? "active" : ""}`}>Tümü</div>
                                    <div onClick={() => setFriendView("add")} className="bg-[#248046] text-white px-2 py-0.5 rounded text-sm cursor-pointer">Arkadaş Ekle</div>
                                </>
                            )}
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                            <div className="flex-1 p-4 overflow-y-auto">
                                {activeTab === "dm" && friendView === "add" ? (
                                    <div className="max-w-md">
                                        <h2 className="text-white font-bold uppercase text-sm mb-2">Arkadaş Ekle</h2>
                                        <div className="bg-[#1e1f22] p-2 rounded-lg flex border border-black/20">
                                            <input className="bg-transparent flex-1 outline-none text-sm p-1 text-white" placeholder="Kullanıcı adı gir..." />
                                            <button className="bg-[#5865f2] text-white px-4 py-1 rounded text-sm font-bold">İstek Gönder</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center h-full opacity-20 italic">TalkHub'da sohbete başla kanka!</div>
                                )}
                            </div>
                            {activeTab === "dm" && (
                                <div className="w-80 border-l border-black/10 p-4 hidden lg:block shrink-0">
                                    <h3 className="text-white font-bold text-xl mb-4">Şimdi Aktif</h3>
                                    <div className="bg-[#232428] p-4 rounded-xl text-center text-xs text-gray-400">Şu an her yer sessiz...</div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* SUNUCU MODAL */}
                    {modal === "create" && (
                        <div className="modal-overlay">
                            <div className="bg-[#313338] w-[400px] p-8 rounded-xl shadow-2xl">
                                <h2 className="text-2xl font-bold text-center mb-6">Sunucu Oluştur</h2>
                                <input className="w-full bg-[#1e1f22] p-2 rounded mb-4 outline-none text-white" placeholder="İkon URL (https://...)" value={serverForm.icon} onChange={e => setServerForm({...serverForm, icon: e.target.value})} />
                                <input className="w-full bg-[#1e1f22] p-2 rounded mb-6 outline-none text-white" placeholder="Sunucu Adı" value={serverForm.name} onChange={e => setServerForm({...serverForm, name: e.target.value})} />
                                <div className="flex justify-between">
                                    <button onClick={() => setModal(null)} className="text-white hover:underline text-sm">Geri</button>
                                    <button onClick={createServer} className="bg-[#5865f2] text-white px-6 py-2 rounded font-bold">Oluştur</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
