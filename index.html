<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl cursor-pointer flex items-center justify-center transition-all duration-200 hover:rounded-xl hover:bg-[#23a559] hover:text-white; }
        .active-sidebar { @apply rounded-xl bg-[#5865f2] text-white; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.85); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // BURAYA PUBLIC KEY GELECEK
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [view, setView] = useState("loading");
            const [activeTab, setActiveTab] = useState("dm");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null); // 'create', 'join' veya null
            const [inputVal, setInputVal] = useState("");
            const [userData, setUserData] = useState(null);

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    if (u) {
                        setUserData(u);
                        setView("app");
                        db.collection("servers").where("members", "array-contains", u.uid)
                            .onSnapshot(s => setServers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    } else setView("login");
                });
            }, []);

            const handleCreateServer = async () => {
                if(!inputVal) return;
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                await db.collection("servers").add({
                    name: inputVal,
                    owner: auth.currentUser.uid,
                    members: [auth.currentUser.uid],
                    inviteCode: code
                });
                setModal(null);
                setInputVal("");
            };

            const handleJoinServer = async () => {
                const s = await db.collection("servers").where("inviteCode", "==", inputVal.toUpperCase()).get();
                if(!s.empty) {
                    await s.docs[0].ref.update({ members: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid) });
                    setModal(null);
                    setInputVal("");
                } else alert("Kod geçersiz kanka!");
            };

            if (view === "app") return (
                <div className="flex h-screen w-full select-none relative">
                    
                    {/* SOL SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setActiveTab("dm")} className={`sidebar-btn font-bold text-xs ${activeTab === "dm" ? "active-sidebar" : ""}`}>DM</div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} 
                                 className={`sidebar-btn font-bold ${activeTab === s.id ? "active-sidebar" : ""}`}>
                                {s.name[0].toUpperCase()}
                            </div>
                        ))}

                        <div onClick={() => setModal("create")} className="sidebar-btn text-2xl">+</div>
                        <div onClick={() => setModal("join")} className="sidebar-btn text-lg">➔</div>
                    </div>

                    {/* KANAL PANELİ */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col">
                        <div className="h-12 border-b border-black/10 flex items-center px-4 font-bold shadow-sm">
                            {activeTab === "dm" ? "DM Kutusu" : servers.find(x => x.id === activeTab)?.name}
                        </div>
                        <div className="flex-1 p-2">
                            <div className="text-xs font-bold text-gray-400 p-2 uppercase">
                                {activeTab === "dm" ? "Direkt Mesajlar" : "Kanallar"}
                            </div>
                            <div className="p-2 rounded bg-[#404249] text-white text-sm cursor-pointer">
                                {activeTab === "dm" ? "Kanka henüz DM yok" : "# genel-sohbet"}
                            </div>
                        </div>
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-[#5865f2] rounded-full"></div>
                                <span className="text-xs font-bold truncate w-20">{userData?.displayName || "User"}</span>
                            </div>
                            <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                        </div>
                    </div>

                    {/* ANA MESAJ ALANI */}
                    <div className="flex-1 flex flex-col bg-[#313338]">
                        <div className="h-12 border-b border-black/10 flex items-center px-4 font-bold">
                            <span className="text-gray-400 mr-2">#</span>
                            {activeTab === "dm" ? "Arkadaşların" : "genel-sohbet"}
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center opacity-40 italic">
                            {activeTab === "dm" ? "Burada kimse yok, arkadaş ekle kanka!" : "Bu sunucunun başlangıcı."}
                        </div>
                        <div className="p-4 px-6">
                            <input placeholder="Mesaj gönder..." className="w-full bg-[#383a40] p-3 rounded-lg outline-none text-sm" />
                        </div>
                    </div>

                    {/* MODAL SİSTEMİ (PRO PANEL) */}
                    {modal && (
                        <div className="absolute inset-0 modal-bg flex items-center justify-center z-50">
                            <div className="bg-[#313338] w-[440px] p-8 rounded-lg shadow-2xl relative">
                                <button onClick={() => setModal(null)} className="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
                                <h2 className="text-2xl font-bold text-center mb-2">
                                    {modal === "create" ? "Sunucunu Oluştur" : "Bir Sunucuya Katıl"}
                                </h2>
                                <p className="text-gray-400 text-center text-sm mb-6">
                                    {modal === "create" ? "Sunucun, arkadaşlarınla takıldığın yerdir." : "Arkadaşından aldığın davet kodunu aşağıya yaz."}
                                </p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-400 uppercase">
                                            {modal === "create" ? "Sunucu Adı" : "Davet Kodu"}
                                        </label>
                                        <input autoFocus className="w-full bg-[#1e1f22] p-3 rounded mt-2 outline-none" 
                                               value={inputVal} onChange={e => setInputVal(e.target.value)}
                                               placeholder={modal === "create" ? "Kanka'nın Sunucusu" : "Örn: H7B2X9"} />
                                    </div>
                                    <button onClick={modal === "create" ? handleCreateServer : handleJoinServer}
                                            className="w-full bg-[#5865f2] py-3 rounded font-bold hover:bg-[#4752c4] transition">
                                        {modal === "create" ? "Oluştur" : "Sunucuya Katıl"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === "login") return <div className="h-screen flex items-center justify-center text-2xl font-bold">Lütfen Giriş Yap kanka...</div>;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
