<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbette 1 Numara </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Core -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #36393f; color: white; margin: 0; overflow: hidden; font-family: 'gg sans', 'Noto Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .server-icon { transition: all 0.2s ease-in-out; }
        .server-icon:hover { border-radius: 12px; background-color: #5865f2; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- YAPILANDIRMA ---
        emailjs.init("uV4bxwyVG2ionvlqj"); // EmailJS Public Key

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [authState, setAuthState] = useState("loading"); // loading, login, register, otp, main
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [otpInput, setOtpInput] = useState("");
            const [generatedCode, setGeneratedCode] = useState("");
            
            const [activeServer, setActiveServer] = useState("home");
            const [servers, setServers] = useState([]);
            const [messages, setMessages] = useState([]);
            const [inputMsg, setInputMsg] = useState("");
            const [showServerPanel, setShowServerPanel] = useState(false);

            // Auth Takibi
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    if (u) { setUser(u); setAuthState("main"); } 
                    else { setAuthState("login"); }
                });
                return unsub;
            }, []);

            // E-POSTA KODU GÖNDER (EmailJS)
            const sendVerificationEmail = (e) => {
                e.preventDefault();
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedCode(code);

                emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                    to_email: email,
                    message: "TalkHub Kayıt Kodun: " + code,
                    code: code
                }).then(() => {
                    setAuthState("otp");
                }).catch(err => alert("Email gönderilemedi: " + err.text));
            };

            // KAYIT OL VE DOĞRULA
            const finalizeSignUp = () => {
                if (otpInput === generatedCode) {
                    auth.createUserWithEmailAndPassword(email, pass)
                        .catch(err => alert("Hata: " + err.message));
                } else {
                    alert("Girdiğin kod yanlış kanka!");
                }
            };

            // MESAJLARI ÇEK
            useEffect(() => {
                if (activeServer !== "home") {
                    const q = db.collection("chat").where("sid", "==", activeServer).orderBy("ts", "asc");
                    return q.onSnapshot(snap => {
                        setMessages(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    });
                }
            }, [activeServer]);

            const handleSend = (e) => {
                if (e.key === "Enter" && inputMsg.trim()) {
                    db.collection("chat").add({
                        sid: activeServer,
                        text: inputMsg,
                        uid: user.uid,
                        uName: user.email.split('@')[0],
                        ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputMsg("");
                }
            };

            // --- GÖRÜNÜMLER ---

            if (authState === "login" || authState === "register") return (
                <div className="flex h-screen items-center justify-center bg-[#2f3136]">
                    <div className="bg-[#36393f] p-10 rounded shadow-2xl w-96 border border-gray-800">
                        <h2 className="text-2xl font-bold text-center mb-6">{authState === "login" ? "Hoş Geldin!" : "Hesap Oluştur"}</h2>
                        <form onSubmit={authState === "register" ? sendVerificationEmail : (e) => { e.preventDefault(); auth.signInWithEmailAndPassword(email, pass); }}>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">E-posta</label>
                                    <input type="email" required className="w-full bg-[#202225] p-2.5 rounded mt-1 outline-none focus:ring-1 ring-[#5865f2]" onChange={e => setEmail(e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">Şifre</label>
                                    <input type="password" required className="w-full bg-[#202225] p-2.5 rounded mt-1 outline-none focus:ring-1 ring-[#5865f2]" onChange={e => setPass(e.target.value)} />
                                </div>
                                <button type="submit" className="w-full bg-[#5865f2] py-3 rounded font-bold hover:bg-[#4752c4] transition">
                                    {authState === "login" ? "Giriş Yap" : "Kayıt Ol (Kod Gönder)"}
                                </button>
                            </div>
                        </form>
                        <p className="mt-4 text-sm text-gray-400 text-center">
                            {authState === "login" ? "Bir hesaba mı ihtiyacın var?" : "Zaten hesabın var mı?"} 
                            <span className="text-[#00aff4] cursor-pointer ml-1" onClick={() => setAuthState(authState === "login" ? "register" : "login")}>Tıkla</span>
                        </p>
                    </div>
                </div>
            );

            if (authState === "otp") return (
                <div className="flex h-screen items-center justify-center bg-[#2f3136]">
                    <div className="bg-[#36393f] p-10 rounded text-center w-80">
                        <h2 className="text-xl font-bold mb-4">Kodu Gir</h2>
                        <input type="text" maxLength="6" className="w-full bg-[#202225] p-4 text-center text-2xl tracking-widest rounded mb-6 outline-none" onChange={e => setOtpInput(e.target.value)} />
                        <button onClick={finalizeSignUp} className="w-full bg-[#3ec44f] py-3 rounded font-bold">Doğrula</button>
                    </div>
                </div>
            );

            if (authState === "main") return (
                <div className="flex h-screen w-full">
                    {/* PANEL: SUNUCU EKLE */}
                    {showServerPanel && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
                            <div className="bg-[#36393f] p-8 rounded-lg w-80">
                                <h3 className="text-lg font-bold mb-4">Sunucu Kur</h3>
                                <input id="snm" placeholder="Sunucu Adı" className="w-full bg-[#202225] p-2 rounded mb-4 outline-none" />
                                <div className="flex justify-end space-x-2">
                                    <button onClick={() => setShowServerPanel(false)}>Vazgeç</button>
                                    <button onClick={() => {
                                        const n = document.getElementById('snm').value;
                                        if(n) setServers([...servers, {id: 's'+Date.now(), name: n}]);
                                        setShowServerPanel(false);
                                    }} className="bg-[#5865f2] px-4 py-2 rounded font-bold">Oluştur</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SOL KENAR (SUNUCULAR) */}
                    <div className="w-[72px] bg-[#202225] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setActiveServer("home")} className={`w-12 h-12 flex items-center justify-center cursor-pointer server-icon rounded-3xl ${activeServer === "home" ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f]"}`}>🏠</div>
                        <div className="w-8 h-[2px] bg-[#36393f] rounded-full mx-auto my-1"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveServer(s.id)} className={`w-12 h-12 flex items-center justify-center font-bold cursor-pointer server-icon rounded-3xl ${activeServer === s.id ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f]"}`}>
                                {s.name.charAt(0)}
                            </div>
                        ))}
                        <button onClick={() => setShowServerPanel(true)} className="w-12 h-12 bg-[#36393f] rounded-3xl text-[#3ec44f] hover:bg-[#3ec44f] hover:text-white hover:rounded-xl transition-all text-2xl">+</button>
                    </div>

                    {/* LİSTE VE CHAT */}
                    <div className="flex-1 flex flex-col bg-[#2f3136]">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 font-bold shadow-sm">
                            {activeServer === "home" ? "Ana Sayfa" : `# ${servers.find(x => x.id === activeServer)?.name}`}
                        </div>
                        
                        <div className="flex-1 flex overflow-hidden">
                            {/* SOL LİSTE */}
                            <div className="w-60 bg-[#2f3136] flex flex-col border-r border-[#26272b]">
                                <div className="flex-1 p-2 text-gray-400 text-sm italic">
                                    {activeServer === "home" ? "Henüz arkadaşın yok." : "Kanallar: #genel"}
                                </div>
                                <div className="bg-[#292b2f] p-2 flex items-center justify-between">
                                    <span className="text-xs font-bold truncate">{user?.email.split('@')[0]}</span>
                                    <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                                </div>
                            </div>

                            {/* CHAT ALANI */}
                            <div className="flex-1 flex flex-col bg-[#36393f]">
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {activeServer === "home" ? (
                                        <div className="h-full flex items-center justify-center text-gray-500 italic">Bir sunucu seç veya oluştur.</div>
                                    ) : (
                                        messages.map(m => (
                                            <div key={m.id} className="flex flex-col">
                                                <span className="text-xs font-bold text-[#5865f2]">{m.uName}</span>
                                                <span className="text-sm text-gray-200">{m.text}</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {activeServer !== "home" && (
                                    <div className="p-4">
                                        <input 
                                            value={inputMsg}
                                            onChange={e => setInputMsg(e.target.value)}
                                            onKeyDown={handleSend}
                                            placeholder="Mesaj yaz..." 
                                            className="w-full bg-[#40444b] rounded p-3 outline-none" 
                                        />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
