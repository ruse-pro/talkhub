<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: sans-serif; overflow: hidden; }
        .th-logo { @apply w-12 h-12 flex items-center justify-center bg-[#5865f2] text-white font-black rounded-[16px] transition-all hover:rounded-[12px] cursor-pointer; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl flex items-center justify-center transition-all hover:rounded-xl hover:bg-[#5865f2] hover:text-white cursor-pointer relative; }
        .sidebar-btn.active::before { content: ""; position: absolute; left: -12px; height: 35px; width: 4px; background: white; border-radius: 0 4px 4px 0; }
        .modal-overlay { background: rgba(0,0,0,0.85); position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [userData, setUserData] = useState(null);
            const [servers, setServers] = useState([]);
            const [activeTab, setActiveTab] = useState("dm");
            const [modal, setModal] = useState(null);
            
            // Input States
            const [serverName, setServerName] = useState("");
            const [newName, setNewName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        // Kullanıcı verisini çek
                        const userDoc = await db.collection("users").doc(u.uid).get();
                        if (userDoc.exists) setUserData(userDoc.data());
                        
                        // Sunucuları çek
                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(snap => {
                              setServers(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                          });
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Sunucu Ekleme Fonksiyonu
            const createServer = async () => {
                if(!serverName) return;
                try {
                    const newServer = {
                        name: serverName,
                        owner: user.uid,
                        members: [user.uid],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection("servers").add(newServer);
                    setServerName("");
                    setModal(null);
                    alert("Sunucu başarıyla oluşturuldu!");
                } catch (e) { alert("Hata: " + e.message); }
            };

            const handleLogin = async () => {
                try { await auth.signInWithEmailAndPassword(email, password); } 
                catch (e) { alert("Giriş başarısız kanka."); }
            };

            if (loading) return <div className="h-screen bg-[#1e1f22] flex items-center justify-center text-white">Yükleniyor...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22]">
                    <div className="bg-[#313338] p-8 rounded-xl w-80 text-center">
                        <div className="th-logo mx-auto mb-6">TH</div>
                        <input className="w-full bg-[#1e1f22] p-2 rounded mb-2 text-white" placeholder="E-posta" onChange={e => setEmail(e.target.value)} />
                        <input type="password" className="w-full bg-[#1e1f22] p-2 rounded mb-4 text-white" placeholder="Şifre" onChange={e => setPassword(e.target.value)} />
                        <button onClick={handleLogin} className="w-full bg-[#5865f2] py-2 rounded font-bold text-white">Giriş Yap</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 shrink-0">
                        <div onClick={() => setActiveTab("dm")} className={`th-logo ${activeTab === "dm" ? "rounded-xl" : ""}`}>TH</div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} 
                                 className={`sidebar-btn ${activeTab === s.id ? "active bg-[#5865f2] text-white rounded-xl" : ""}`}>
                                {s.name[0].toUpperCase()}
                            </div>
                        ))}

                        <div onClick={() => setModal("createServer")} className="sidebar-btn text-2xl font-light">+</div>
                    </div>

                    {/* PANEL */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 flex items-center px-4 font-bold border-b border-black/20 text-white truncate shadow-sm">
                            {activeTab === "dm" ? "TalkHub" : servers.find(s => s.id === activeTab)?.name}
                        </div>
                        <div className="flex-1 p-2">
                            {activeTab === "dm" ? (
                                <div className="p-2 rounded bg-[#3f4147] text-white cursor-pointer font-medium">👥 Arkadaşlar</div>
                            ) : (
                                <div className="text-sm text-gray-400 p-2"># genel-sohbet</div>
                            )}
                        </div>
                        
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center text-[10px] text-white font-bold">TH</div>
                                <span className="text-xs font-bold text-white truncate w-24">{userData?.nickname || user.email.split('@')[0]}</span>
                            </div>
                            <span className="text-gray-400 cursor-pointer text-lg hover:text-white transition" onClick={() => setModal("userSettings")}>⚙️</span>
                        </div>
                    </div>

                    {/* ANA ALAN */}
                    <div className="flex-1 bg-[#313338] flex items-center justify-center flex-col text-center p-4">
                        <h1 className="text-2xl font-bold text-white mb-2">
                            {activeTab === "dm" ? `Selam, ${userData?.nickname || 'Kanka'}!` : `${servers.find(s => s.id === activeTab)?.name} Sunucusuna Hoş Geldin!`}
                        </h1>
                        <p className="text-gray-400">Burada henüz bir mesaj yok.</p>
                    </div>

                    {/* SUNUCU EKLEME MODALI */}
                    {modal === "createServer" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-6 rounded-xl w-80 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h2 className="text-white text-lg font-bold mb-4 text-center">Sunucunu Oluştur</h2>
                                <input className="w-full bg-[#1e1f22] p-3 rounded mb-4 text-white outline-none" 
                                       placeholder="Sunucu Adı" value={serverName} onChange={e => setServerName(e.target.value)} />
                                <button onClick={createServer} className="w-full bg-[#23a559] py-2 rounded font-bold text-white hover:bg-[#1a7a42]">Oluştur</button>
                            </div>
                        </div>
                    )}

                    {/* HESAP AYARLARI MODALI */}
                    {modal === "userSettings" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-6 rounded-xl w-80 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h2 className="text-white text-lg font-bold mb-4">Hesap Ayarları</h2>
                                <input className="w-full bg-[#1e1f22] p-3 rounded mb-4 text-white outline-none" 
                                       placeholder="Yeni Takma Ad" value={newName} onChange={e => setNewName(e.target.value)} />
                                <button onClick={async () => {
                                    await db.collection("users").doc(user.uid).update({ nickname: newName });
                                    setUserData({...userData, nickname: newName});
                                    setModal(null);
                                }} className="w-full bg-[#5865f2] py-2 rounded font-bold text-white">Güncelle</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
