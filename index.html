<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2e3338; }
        ::-webkit-scrollbar-thumb { background: #202225; border-radius: 10px; }
        .modal-bg { background: rgba(0,0,0,0.85); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const TalkHub = () => {
            const [view, setView] = useState("server"); // "server" veya "dm"
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [messages, setMessages] = useState([
                { id: 1, user: "TalkHub Bot", text: "TalkHub'a hoş geldin! DM, Sunucu Ekleme ve Profil özellikleri eklendi. 🔥", time: "16:20" }
            ]);

            return (
                <div className="flex h-screen w-full bg-[#36393f] text-gray-100 overflow-hidden font-sans select-none">
                    
                    {/* MODAL: SUNUCU EKLEME */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-bg px-4">
                            <div className="bg-white text-gray-800 p-6 rounded-lg w-full max-w-md text-center">
                                <h2 className="text-2xl font-bold mb-2">Sunucunu Oluştur</h2>
                                <p className="text-gray-500 mb-6">Sunucun, senin ve arkadaşlarının birlikte vakit geçirdiği yerdir.</p>
                                <input type="text" placeholder="Sunucu Adı" className="w-full bg-gray-100 p-3 rounded border border-gray-300 focus:outline-none mb-4" />
                                <div className="flex justify-between items-center mt-4">
                                    <button onClick={() => setIsModalOpen(false)} className="text-sm font-medium hover:underline">Geri Dön</button>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-[#5865f2] text-white px-6 py-2 rounded font-medium hover:bg-[#4752c4]">Oluştur</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 1. SÜTUN: SUNUCU LİSTESİ */}
                    <div className="w-[72px] bg-[#202225] flex flex-col items-center py-3 space-y-2 flex-shrink-0">
                        {/* DM Butonu */}
                        <div onClick={() => setView("dm")} className={`w-12 h-12 rounded-3xl flex items-center justify-center cursor-pointer transition-all duration-200 ${view === "dm" ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f] hover:bg-[#5865f2] hover:rounded-xl"}`}>
                            <span className="text-xl">💬</span>
                        </div>
                        <div className="w-8 h-[2px] bg-[#36393f] rounded-full my-1"></div>
                        
                        {/* Sunucu 1 */}
                        <div onClick={() => setView("server")} className={`w-12 h-12 rounded-3xl flex items-center justify-center cursor-pointer transition-all duration-200 ${view === "server" ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f] hover:bg-[#5865f2] hover:rounded-xl"}`}>
                            TH
                        </div>

                        {/* Ekle Butonu */}
                        <div onClick={() => setIsModalOpen(true)} className="w-12 h-12 bg-[#36393f] text-[#3ec44f] rounded-3xl flex items-center justify-center cursor-pointer hover:bg-[#3ec44f] hover:text-white hover:rounded-xl transition-all duration-200">
                            <span className="text-2xl font-light">+</span>
                        </div>
                    </div>

                    {/* 2. SÜTUN: KANAL / DM LİSTESİ */}
                    <div className="w-60 bg-[#2f3136] flex flex-col flex-shrink-0">
                        <div className="h-12 shadow-md flex items-center px-4 font-bold border-b border-[#26272b]">
                            {view === "server" ? "TalkHub Sunucusu" : "Direkt Mesajlar"}
                        </div>
                        <div className="flex-1 p-3 space-y-1">
                            {view === "server" ? (
                                <>
                                    <div className="text-gray-400 text-[11px] font-bold px-2 uppercase mb-1">Metin Kanalları</div>
                                    <div className="bg-[#393c43] px-2 py-1.5 rounded text-white cursor-pointer flex items-center"># genel</div>
                                    <div className="hover:bg-[#393c43] px-2 py-1.5 rounded text-gray-400 cursor-pointer flex items-center"># yazılım</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-gray-400 text-[11px] font-bold px-2 uppercase mb-1">Arkadaşlar</div>
                                    <div className="hover:bg-[#393c43] px-2 py-1.5 rounded text-gray-400 cursor-pointer flex items-center space-x-2">
                                        <div className="w-8 h-8 bg-orange-500 rounded-full"></div>
                                        <span>Trickster</span>
                                    </div>
                                    <div className="hover:bg-[#393c43] px-2 py-1.5 rounded text-gray-400 cursor-pointer flex items-center space-x-2">
                                        <div className="w-8 h-8 bg-blue-500 rounded-full"></div>
                                        <span>Ersoy</span>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* KULLANICI PANELİ (Alt Kısım) */}
                        <div className="bg-[#292b2f] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2 hover:bg-[#3f4147] p-1 rounded cursor-pointer transition-colors pr-4">
                                <div className="relative">
                                    <div className="w-8 h-8 bg-[#5865f2] rounded-full flex items-center justify-center font-bold text-xs text-white">BEN</div>
                                    <div className="absolute bottom-0 right-0 w-3 h-3 bg-[#3ec44f] border-2 border-[#292b2f] rounded-full"></div>
                                </div>
                                <div className="flex flex-col min-w-0">
                                    <span className="text-[13px] font-bold text-white truncate leading-none">Kullanıcı#0001</span>
                                    <span className="text-[11px] text-gray-400 leading-none">Çevrimiçi</span>
                                </div>
                            </div>
                            <div className="flex space-x-1">
                                <button className="p-1.5 hover:bg-[#3f4147] rounded text-gray-400">⚙️</button>
                            </div>
                        </div>
                    </div>

                    {/* 3. SÜTUN: ANA PANEL */}
                    <div className="flex-1 flex flex-col bg-[#36393f]">
                        <div className="h-12 shadow-md flex items-center px-4 border-b border-[#26272b] font-semibold">
                           {view === "server" ? "# genel" : "Arkadaşlarla Sohbet"}
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {/* Mesajlar buraya gelecek (Önceki kodun aynısı) */}
                            {messages.map(m => (
                                <div key={m.id} className="flex space-x-3">
                                    <div className="w-10 h-10 bg-gray-500 rounded-full flex-shrink-0"></div>
                                    <div>
                                        <span className="font-bold mr-2 text-white">{m.user}</span>
                                        <span className="text-xs text-gray-500">{m.time}</span>
                                        <p className="text-gray-300">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4">
                            <div className="bg-[#40444b] rounded-lg px-4 py-2">
                                <input type="text" placeholder="Mesaj yaz..." className="bg-transparent w-full focus:outline-none text-gray-200" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
