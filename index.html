<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TalkHub | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (Kabloları döşüyoruz) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // SENİN ANAHTARLARIN BURADA!
        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2",
            measurementId: "G-3CSLDB0P8L"
        };

        // Firebase'i başlat
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHub = () => {
            const [user, setUser] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [inputText, setInputText] = React.useState("");

            React.useEffect(() => {
                auth.onAuthStateChanged(u => setUser(u));
                
                // Mesajları canlı dinle
                const unsubscribe = db.collection("messages")
                    .orderBy("time", "asc")
                    .limitToLast(50)
                    .onSnapshot(snapshot => {
                        const msgData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setMessages(msgData);
                    });
                return () => unsubscribe();
            }, []);

            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => alert("Hata: " + err.message));
            };

            const sendMessage = (e) => {
                if (e.key === 'Enter' && inputText.trim() !== "" && user) {
                    db.collection("messages").add({
                        text: inputText,
                        user: user.displayName,
                        photo: user.photoURL,
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText("");
                }
            };

            if (!user) {
                return (
                    <div className="h-screen bg-[#36393f] flex items-center justify-center">
                        <button onClick={login} className="bg-[#5865f2] text-white px-8 py-3 rounded font-bold hover:bg-[#4752c4] transition shadow-xl">
                            Google ile TalkHub'a Gir
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full bg-[#36393f] text-gray-100 font-sans">
                    {/* Yan Panel */}
                    <div className="w-60 bg-[#2f3136] flex flex-col border-r border-[#26272b]">
                        <div className="h-12 flex items-center px-4 font-bold shadow-sm">TalkHub Sunucusu</div>
                        <div className="flex-1 p-3">
                            <div className="bg-[#393c43] px-2 py-1.5 rounded text-white cursor-pointer"># genel-sohbet</div>
                        </div>
                        {/* Profil */}
                        <div className="bg-[#292b2f] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2 overflow-hidden">
                                <img src={user.photoURL} className="w-8 h-8 rounded-full border border-gray-600" />
                                <span className="text-xs font-bold truncate">{user.displayName}</span>
                            </div>
                            <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                        </div>
                    </div>

                    {/* Chat */}
                    <div className="flex-1 flex flex-col">
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {messages.map(m => (
                                <div key={m.id} className="flex space-x-3">
                                    <img src={m.photo} className="w-10 h-10 rounded-full" />
                                    <div>
                                        <div className="flex items-center space-x-2">
                                            <span className="font-bold text-white text-sm">{m.user}</span>
                                        </div>
                                        <p className="text-gray-300 text-sm">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4">
                            <input 
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                onKeyDown={sendMessage}
                                placeholder="Mesaj gönder..." 
                                className="w-full bg-[#40444b] rounded-lg px-4 py-3 focus:outline-none text-sm"
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
