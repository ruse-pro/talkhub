<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TalkHub | Kasrga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#36393f] text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- YAPILANDIRMA ---
        emailjs.init("FdTOZL7AMRiGdirp-"); //

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [authState, setAuthState] = useState("login");
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [displayName, setDisplayName] = useState("");
            const [username, setUsername] = useState("");
            const [generatedCode, setGeneratedCode] = useState("");
            const [otpInput, setOtpInput] = useState("");

            // HATAYI ÖNLEYEN GÖNDERİM FONKSİYONU
            const startRegistration = (e) => {
                e.preventDefault();
                
                // Mail adresi boşsa gönderimi durdur (Hata Fix)
                if (!email) {
                    alert("Lütfen bir e-posta adresi gir!");
                    return;
                }

                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedCode(code);

                // Parametreleri kontrol ederek gönderiyoruz
                const templateParams = {
                    to_email: email, // EmailJS şablonunda alıcı kısmına bunu yazmalısın
                    code: code
                };

                emailjs.send("service_lz0s5ir", "template_h4u1jp8", templateParams)
                    .then(() => {
                        setAuthState("otp");
                    })
                    .catch(err => alert("Email hatası: " + err.text));
            };

            const finalizeSignUp = async () => {
                if (otpInput === generatedCode) {
                    try {
                        const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                        await userCredential.user.updateProfile({ displayName: displayName });
                        
                        // Kullanıcı verilerini Firestore'a kaydet (Görünen ad ve kullanıcı adı)
                        await db.collection("users").doc(userCredential.user.uid).set({
                            username: username.toLowerCase(),
                            displayName: displayName,
                            email: email
                        });
                        alert("Başarıyla kayıt oldun!");
                    } catch (err) {
                        alert("Kayıt hatası: " + err.message);
                    }
                } else {
                    alert("Kod hatalı!");
                }
            };

            if (authState === "register") return (
                <div className="h-screen flex items-center justify-center">
                    <div className="bg-[#2f3136] p-8 rounded-lg w-96 shadow-2xl">
                        <h2 className="text-2xl font-bold text-center mb-6">Hesap Oluştur</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="Görünen Ad (Örn: Ahmet Yılmaz)" className="w-full bg-[#202225] p-3 rounded outline-none" onChange={e => setDisplayName(e.target.value)} />
                            <input type="text" placeholder="Kullanıcı Adı (Örn: ahmet123)" className="w-full bg-[#202225] p-3 rounded outline-none" onChange={e => setUsername(e.target.value)} />
                            <input type="email" placeholder="E-posta" className="w-full bg-[#202225] p-3 rounded outline-none" onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Şifre" className="w-full bg-[#202225] p-3 rounded outline-none" onChange={e => setPass(e.target.value)} />
                            <button onClick={startRegistration} className="w-full bg-[#3ec44f] py-3 rounded font-bold hover:bg-[#36a643]">Kodu Gönder</button>
                        </div>
                        <p className="mt-4 text-center text-sm text-gray-400">Zaten üye misin? <span className="text-[#00aff4] cursor-pointer" onClick={() => setAuthState("login")}>Giriş Yap</span></p>
                    </div>
                </div>
            );

            // ... (OTP ve Login ekranları öncekiyle aynı)
            return (
                <div className="h-screen flex items-center justify-center">
                    <button onClick={() => setAuthState("register")} className="bg-[#5865f2] px-10 py-4 rounded font-bold">Kayıt Ekranına Git</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
