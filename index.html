<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        .th-logo-btn { @apply w-12 h-12 flex items-center justify-center cursor-pointer transition-all duration-200 bg-[#5865f2] text-white font-extrabold text-lg rounded-[16px] hover:rounded-[12px]; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl cursor-pointer flex items-center justify-center transition-all duration-200 hover:rounded-xl hover:bg-[#5865f2] hover:text-white relative bg-cover bg-center; }
        .sidebar-btn.active { @apply rounded-xl bg-[#5865f2] text-white; }
        .sidebar-btn.active::before { content: ""; position: absolute; left: -12px; height: 35px; width: 4px; background: white; border-radius: 0 4px 4px 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .th-badge { background: #5865f2; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [activeTab, setActiveTab] = useState("dm");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null);
            const [searchName, setSearchName] = useState("");
            const [newName, setNewName] = useState("");

            const ADMIN_EMAIL = "talkhubofficiall@gmail.com";

            useEffect(() => {
                auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if(u) {
                        const d = await db.collection("users").doc(u.uid).get();
                        setUserData(d.data());
                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(s => setServers(s.docs.map(doc => ({id: doc.id, ...doc.data()}))));
                    }
                });
            }, []);

            // Arkadaş Arama Mantığı
            const findAndAddFriend = async () => {
                const snapshot = await db.collection("users").where("username", "==", searchName).get();
                if (snapshot.empty) {
                    alert("Kanka böyle bir kullanıcı yok amk!");
                } else {
                    alert(`${searchName} kullanıcısına istek gönderildi (veya eklendi)!`);
                    setSearchName("");
                }
            };

            // İsim Değiştirme
            const updateNickname = async () => {
                await db.collection("users").doc(user.uid).update({ nickname: newName });
                setUserData({...userData, nickname: newName});
                alert("İsim güncellendi kanka!");
                setModal(null);
            };

            if (!user) return <div className="h-screen flex items-center justify-center bg-[#1e1f22] text-white">Giriş Yap kanka...</div>;

            return (
                <div className="flex h-screen w-full relative">
                    {/* SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 shrink-0">
                        <div onClick={() => setActiveTab("dm")} className="th-logo-btn">TH</div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} 
                                 className={`sidebar-btn ${activeTab === s.id ? "active" : ""}`}
                                 style={{ backgroundImage: s.icon ? `url(${s.icon})` : 'none' }}>
                                {!s.icon && s.name[0]}
                            </div>
                        ))}
                        <div onClick={() => setModal("create")} className="sidebar-btn text-[#23a559] text-2xl font-bold">+</div>
                        {user.email === ADMIN_EMAIL && <div className="sidebar-btn text-xl text-yellow-500">👑</div>}
                    </div>

                    {/* SOL PANEL */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 flex items-center px-4 font-bold border-b border-black/20">
                            {activeTab === "dm" ? "TalkHub" : servers.find(x => x.id === activeTab)?.name}
                        </div>
                        <div className="flex-1 p-2 space-y-4">
                            {activeTab === "dm" ? (
                                <div className="space-y-1">
                                    <div className="flex items-center p-2 rounded bg-[#3f4147] text-white cursor-pointer">👥 Arkadaşlar</div>
                                    <div className="text-xs font-bold text-gray-400 px-2 py-3 uppercase">Direkt Mesajlar</div>
                                </div>
                            ) : (
                                <div>
                                    <div onClick={() => setModal("serverSettings")} className="p-2 rounded hover:bg-[#35373c] text-gray-400 cursor-pointer text-sm">⚙️ Sunucu Ayarları</div>
                                    <div className="text-xs font-bold text-gray-400 px-2 mt-4 uppercase">Ses Kanalları</div>
                                    <div className="p-2 text-green-500 flex items-center text-sm">🔊 Genel Sesli (Aktif)</div>
                                </div>
                            )}
                        </div>

                        {/* KULLANICI BARI */}
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] relative flex items-center justify-center font-bold text-[10px]">TH</div>
                                <div className="flex flex-col">
                                    <span className="text-xs font-bold text-white">{userData?.nickname || user.email.split('@')[0]}</span>
                                    {user.email === ADMIN_EMAIL && <span className="th-badge">TH</span>}
                                </div>
                            </div>
                            <div className="flex space-x-2 text-gray-400 cursor-pointer">
                                <span onClick={() => setModal("userSettings")}>⚙️</span>
                            </div>
                        </div>
                    </div>

                    {/* ANA ALAN */}
                    <div className="flex-1 bg-[#313338] flex flex-col">
                        <div className="p-10 flex flex-col items-center">
                            <h2 className="text-white text-xl font-bold mb-4">Arkadaş Ekle</h2>
                            <div className="flex bg-[#1e1f22] p-2 rounded w-full max-w-md border border-black/30">
                                <input className="bg-transparent flex-1 outline-none text-white text-sm" placeholder="Kullanıcı adı (ör: a)" 
                                       value={searchName} onChange={e => setSearchName(e.target.value)} />
                                <button onClick={findAndAddFriend} className="bg-[#5865f2] px-4 py-1 rounded text-xs font-bold">Ekle</button>
                            </div>
                        </div>
                    </div>

                    {/* MODAL - KULLANICI AYARLARI */}
                    {modal === "userSettings" && (
                        <div className="modal-overlay">
                            <div className="bg-[#313338] p-8 rounded-xl w-96">
                                <h2 className="text-xl font-bold mb-6 text-white text-center">Hesap Ayarları</h2>
                                <label className="text-xs font-bold text-gray-400 uppercase">Görünen Adı Değiştir</label>
                                <input className="w-full bg-[#1e1f22] p-2 rounded mt-1 mb-6 outline-none text-white" 
                                       placeholder="Yeni İsim" value={newName} onChange={e => setNewName(e.target.value)} />
                                <button onClick={updateNickname} className="w-full bg-[#5865f2] py-2 rounded font-bold mb-2">Kaydet</button>
                                <button onClick={() => setModal(null)} className="w-full text-gray-400 text-sm">Vazgeç</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
