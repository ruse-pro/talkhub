<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TalkHub | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#36393f] select-none text-gray-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHub = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState("setup");
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState("");
            const [serverName, setServerName] = useState("");
            const [friends, setFriends] = useState([]);
            const [userPhoto, setUserPhoto] = useState("");

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    if(u) {
                        setUser(u);
                        setUserPhoto(u.photoURL);
                    }
                });
            }, []);

            useEffect(() => {
                if (view === "server") {
                    const unsub = db.collection("messages").orderBy("time", "asc").limitToLast(50).onSnapshot(s => {
                        setMessages(s.docs.map(d => ({id: d.id, ...d.data()})));
                    });
                    return () => unsub();
                }
            }, [view]);

            const changePhoto = () => {
                const newUrl = prompt("Yeni profil fotoğrafı linkini yapıştır:", userPhoto);
                if(newUrl) setUserPhoto(newUrl);
            };

            const addFriend = () => {
                const name = prompt("Eklemek istediğin arkadaşın adı:");
                if(name) setFriends([...friends, { name, id: Date.now() }]);
            };

            const sendMessage = (e) => {
                if(e.key === 'Enter' && inputText.trim() && user) {
                    db.collection("messages").add({
                        text: inputText,
                        user: user.displayName,
                        photo: userPhoto,
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText("");
                }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#2f3136]">
                    <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="bg-[#5865f2] px-10 py-4 rounded font-bold text-white shadow-2xl hover:bg-[#4752c4] transition">TalkHub'a Giriş Yap</button>
                </div>
            );

            if (view === "setup") return (
                <div className="h-screen flex items-center justify-center bg-[#2f3136]">
                    <div className="bg-[#36393f] p-8 rounded-xl w-full max-w-md shadow-2xl border border-gray-700">
                        <h2 className="text-2xl font-bold text-center mb-6">Nasıl Başlamak İstersin?</h2>
                        <div className="space-y-4">
                            <div className="p-4 bg-[#2f3136] rounded-lg border border-dashed border-gray-500 hover:border-[#5865f2] cursor-pointer group transition">
                                <input value={serverName} onChange={e => setServerName(e.target.value)} placeholder="Sunucu Adı" className="bg-transparent w-full outline-none text-white font-bold" />
                                <button onClick={() => serverName && setView("server")} className="w-full mt-3 bg-[#5865f2] py-2 rounded font-bold text-sm">Sunucu Oluştur</button>
                            </div>
                            <button onClick={() => setView("dm")} className="w-full py-3 text-gray-400 hover:text-white text-sm font-medium transition">Sunucu istemiyorum, direkt mesajlara geç</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    {/* SOL NAV */}
                    <div className="w-[72px] bg-[#202225] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setView("dm")} className={`w-12 h-12 flex items-center justify-center cursor-pointer transition-all ${view === "dm" ? "bg-[#5865f2] rounded-xl text-white" : "bg-[#36393f] rounded-3xl hover:bg-[#5865f2] hover:rounded-xl text-gray-300"}`}>💬</div>
                        <div className="w-8 h-[2px] bg-[#2f3136] rounded-full"></div>
                        {serverName && (
                            <div onClick={() => setView("server")} className={`w-12 h-12 flex items-center justify-center font-bold cursor-pointer transition-all ${view === "server" ? "bg-[#5865f2] rounded-xl text-white" : "bg-[#36393f] rounded-3xl hover:bg-[#5865f2] hover:rounded-xl text-gray-300"}`}>
                                {serverName.charAt(0).toUpperCase()}
                            </div>
                        )}
                    </div>

                    {/* LİSTE SÜTUNU */}
                    <div className="w-60 bg-[#2f3136] flex flex-col">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 font-bold shadow-sm">
                            {view === "server" ? serverName : "Direkt Mesajlar"}
                        </div>
                        <div className="flex-1 p-3 overflow-y-auto">
                            {view === "server" ? (
                                <div className="bg-[#393c43] px-2 py-2 rounded text-white text-sm"># genel-sohbet</div>
                            ) : (
                                <div className="space-y-4">
                                    <button onClick={addFriend} className="w-full bg-[#3ec44f] py-2 rounded font-bold text-[13px] hover:bg-[#34a843]">Arkadaş Ekle</button>
                                    <div className="text-gray-400 text-[11px] font-bold uppercase px-1">Tüm Arkadaşlar ({friends.length})</div>
                                    {friends.map(f => (
                                        <div key={f.id} className="flex items-center space-x-2 p-2 hover:bg-[#393c43] rounded cursor-pointer group">
                                            <div className="w-8 h-8 bg-gray-500 rounded-full"></div>
                                            <span className="text-sm text-gray-300 group-hover:text-white">{f.name}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        {/* KULLANICI PANELİ */}
                        <div className="bg-[#292b2f] p-2 flex items-center space-x-2">
                            <div onClick={changePhoto} className="relative cursor-pointer group">
                                <img src={userPhoto} className="w-8 h-8 rounded-full border border-gray-700" />
                                <div className="absolute inset-0 bg-black bg-opacity-40 rounded-full items-center justify-center hidden group-hover:flex text-[8px] font-bold">DÜZENLE</div>
                            </div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-xs font-bold truncate">{user.displayName}</p>
                                <p className="text-[10px] text-gray-400">Çevrimiçi</p>
                            </div>
                            <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                        </div>
                    </div>

                    {/* CHAT PANELİ */}
                    <div className="flex-1 bg-[#36393f] flex flex-col">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 shadow-sm text-gray-400 text-sm">
                           {view === "server" ? `# genel-sohbet` : `Mesajlaşmaya başla`}
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {view === "server" ? messages.map(m => (
                                <div key={m.id} className="flex space-x-3">
                                    <img src={m.photo} className="w-10 h-10 rounded-full" />
                                    <div>
                                        <span className="font-bold text-white text-sm mr-2">{m.user}</span>
                                        <p className="text-gray-300 text-[14px]">{m.text}</p>
                                    </div>
                                </div>
                            )) : (
                                <div className="flex flex-col items-center justify-center h-full opacity-20">
                                    <span className="text-6xl mb-4">✨</span>
                                    <p>Burada henüz mesaj yok...</p>
                                </div>
                            )}
                        </div>
                        {view === "server" && (
                            <div className="p-4 bg-[#36393f]">
                                <input value={inputText} onChange={e => setInputText(e.target.value)} onKeyDown={sendMessage} placeholder={`${serverName} kanalına mesaj gönder`} className="w-full bg-[#40444b] rounded-lg px-4 py-3 outline-none text-[14px]" />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
