<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Başlasın</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: sans-serif; overflow: hidden; }
        .th-logo { @apply w-12 h-12 flex items-center justify-center bg-[#5865f2] text-white font-black rounded-[16px] transition-all hover:rounded-[12px] cursor-pointer; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl flex items-center justify-center transition-all hover:rounded-xl hover:bg-[#5865f2] hover:text-white cursor-pointer; }
        .modal-overlay { background: rgba(0,0,0,0.85); position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [userData, setUserData] = useState(null);
            const [activeTab, setActiveTab] = useState("dm");
            const [modal, setModal] = useState(null);
            const [newName, setNewName] = useState("");
            
            // Login States
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const doc = await db.collection("users").doc(u.uid).get();
                        if (doc.exists) {
                            setUserData(doc.data());
                        } else {
                            // Eğer kullanıcı DB'de yoksa (yeni kayıt), oluştur
                            const newData = { username: u.email.split('@')[0], nickname: u.email.split('@')[0], email: u.email };
                            await db.collection("users").doc(u.uid).set(newData);
                            setUserData(newData);
                        }
                        setUser(u);
                    } else {
                        setUser(null);
                        setUserData(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async () => {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (e) { alert("Hata: " + e.message); }
            };

            const updateNickname = async () => {
                if(!newName) return;
                await db.collection("users").doc(user.uid).update({ nickname: newName });
                setUserData({...userData, nickname: newName});
                setModal(null);
                alert("İsim güncellendi!");
            };

            if (loading) return <div className="h-screen bg-[#1e1f22] flex items-center justify-center text-white font-bold">TalkHub Yükleniyor...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22] p-4">
                    <div className="bg-[#313338] p-8 rounded-2xl w-full max-w-md shadow-2xl border border-white/5">
                        <div className="th-logo mx-auto mb-6 text-xl">TH</div>
                        <h2 className="text-2xl font-bold text-white text-center mb-6">TalkHub'a Giriş Yap</h2>
                        <input className="w-full bg-[#1e1f22] p-3 rounded mb-4 text-white outline-none border border-transparent focus:border-[#5865f2]" 
                               placeholder="E-posta" onChange={e => setEmail(e.target.value)} />
                        <input type="password" className="w-full bg-[#1e1f22] p-3 rounded mb-6 text-white outline-none border border-transparent focus:border-[#5865f2]" 
                               placeholder="Şifre" onChange={e => setPassword(e.target.value)} />
                        <button onClick={handleLogin} className="w-full bg-[#5865f2] py-3 rounded font-bold text-white hover:bg-[#4752c4] transition">Giriş Yap</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 shrink-0">
                        <div onClick={() => setActiveTab("dm")} className="th-logo">TH</div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        <div className="sidebar-btn text-2xl font-bold">+</div>
                    </div>

                    {/* PANEL */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 flex items-center px-4 font-bold border-b border-black/20 text-white">TalkHub</div>
                        <div className="flex-1 p-2">
                            <div className="p-2 rounded bg-[#3f4147] text-white cursor-pointer font-medium mb-4">👥 Arkadaşlar</div>
                            <div className="text-xs font-bold text-gray-400 px-2 uppercase tracking-widest mb-2">Ayarlar</div>
                            <div onClick={() => setModal("userSettings")} className="p-2 rounded hover:bg-[#35373c] text-gray-300 cursor-pointer text-sm">⚙️ Hesap Ayarları</div>
                        </div>
                        
                        {/* ALT KULLANICI BARI */}
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center font-bold text-[10px] text-white">TH</div>
                                <span className="text-xs font-bold text-white">{userData?.nickname}</span>
                            </div>
                            <span className="text-gray-400 cursor-pointer text-lg" onClick={() => setModal("userSettings")}>⚙️</span>
                        </div>
                    </div>

                    {/* ANA EKRAN */}
                    <div className="flex-1 bg-[#313338] flex flex-col items-center justify-center">
                        <h1 className="text-3xl font-bold text-white mb-2">Hoş geldin, {userData?.nickname}!</h1>
                        <p className="text-gray-400 italic">"Sesli sohbet ve arkadaş ekleme özellikleri geliştiriliyor..."</p>
                    </div>

                    {/* AYARLAR MODALI */}
                    {modal === "userSettings" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-8 rounded-xl w-96 shadow-2xl border border-white/10" onClick={e => e.stopPropagation()}>
                                <h2 className="text-white text-xl font-bold mb-4">Hesap Ayarları</h2>
                                <label className="text-xs font-bold text-gray-400 uppercase">İsim Değiştir</label>
                                <input className="w-full bg-[#1e1f22] p-3 rounded mt-2 mb-6 text-white outline-none" 
                                       placeholder="Yeni İsim" value={newName} onChange={e => setNewName(e.target.value)} />
                                <div className="flex space-x-3">
                                    <button onClick={updateNickname} className="flex-1 bg-[#23a559] py-2 rounded font-bold text-white">Kaydet</button>
                                    <button onClick={() => setModal(null)} className="flex-1 bg-red-500/20 text-red-500 py-2 rounded font-bold">Kapat</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
