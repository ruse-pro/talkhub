<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        /* Tıklanan yerin MAVİ olması ve yan çizgi */
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl cursor-pointer flex items-center justify-center transition-all duration-200 hover:rounded-xl hover:bg-[#5865f2] hover:text-white relative; }
        .sidebar-btn.active { @apply rounded-xl bg-[#5865f2] text-white; }
        .sidebar-btn.active::before { content: ""; position: absolute; left: -12px; height: 35px; width: 4px; background: white; border-radius: 0 4px 4px 0; }
        
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .th-badge { background: #5865f2; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // EmailJS Public Key'ini buraya yapıştır kanka!
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [view, setView] = useState("loading");
            const [activeTab, setActiveTab] = useState("dm");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null);
            const [inputVal, setInputVal] = useState("");
            const [userDoc, setUserDoc] = useState(null);

            const ADMIN_EMAIL = "talkhubofficiall@gmail.com";

            useEffect(() => {
                auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const d = await db.collection("users").doc(u.uid).get();
                        setUserDoc({ id: u.uid, ...d.data() });
                        setView("app");
                        
                        // Sunucuları çekme (Gerçek zamanlı)
                        db.collection("servers").where("members", "array-contains", u.uid)
                            .onSnapshot(s => {
                                setServers(s.docs.map(doc => ({id: doc.id, ...doc.data()})));
                            });
                    } else setView("login");
                });
            }, []);

            // SUNUCU OLUŞTURMA FONKSİYONU
            const handleCreateServer = async () => {
                if(!inputVal.trim()) return alert("İsim yaz kanka!");
                try {
                    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                    await db.collection("servers").add({
                        name: inputVal,
                        owner: auth.currentUser.uid,
                        members: [auth.currentUser.uid],
                        inviteCode: code,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setModal(null);
                    setInputVal("");
                } catch (err) { alert("Hata: " + err.message); }
            };

            if (view === "app") return (
                <div className="flex h-screen w-full relative">
                    
                    {/* SOL PANEL (SUNUCULAR) */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setActiveTab("dm")} 
                             className={`sidebar-btn font-bold text-[10px] ${activeTab === "dm" ? "active" : ""}`}>DM</div>
                        
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} 
                                 className={`sidebar-btn font-bold ${activeTab === s.id ? "active" : ""}`}>
                                {s.name[0].toUpperCase()}
                            </div>
                        ))}

                        <div onClick={() => setModal("create")} className="sidebar-btn text-2xl text-[#23a559] hover:bg-[#23a559] hover:text-white">+</div >
                    </div>

                    {/* ORTA PANEL (KANALLAR) */}
                    <div className="w-60 bg-[#2b2d31] flex flex-col">
                        <div className="h-12 border-b border-black/20 flex items-center px-4 font-bold">
                            {activeTab === "dm" ? "TalkHub" : (servers.find(x => x.id === activeTab)?.name || "Yükleniyor...")}
                        </div>
                        <div className="flex-1 p-2 space-y-1">
                            <div className="text-xs font-bold text-gray-400 p-2 uppercase">Metin Kanalları</div>
                            <div className="p-2 rounded bg-[#404249] text-white flex items-center cursor-pointer">
                                <span className="mr-2 text-gray-400 text-xl">#</span> genel-sohbet
                            </div>
                        </div>
                        
                        {/* KULLANICI BARI */}
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center text-[10px] font-bold">
                                    {userDoc?.pp ? <img src={userDoc.pp} className="rounded-full w-full h-full object-cover"/> : "TH"}
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-center">
                                        <span className="text-xs font-bold text-white">{userDoc?.nickname || "Yükleniyor..."}</span>
                                        {auth.currentUser.email === ADMIN_EMAIL && <span className="th-badge">TH</span>}
                                    </div>
                                    <span className="text-[10px] text-gray-400">@{userDoc?.username || "user"}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MESAJ ALANI */}
                    <div className="flex-1 flex flex-col bg-[#313338]">
                        <div className="h-12 border-b border-black/20 flex items-center px-4 font-bold shadow-sm">
                            <span className="text-gray-400 mr-2 text-xl">#</span> genel-sohbet
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center opacity-20 italic">
                            {activeTab === "dm" ? "Arkadaşlarını buraya davet et kanka!" : "Bu harika sunucunun başlangıcı!"}
                        </div>
                        <div className="p-4">
                            <div className="bg-[#383a40] rounded-lg px-4 py-3 flex items-center">
                                <input placeholder="Mesaj gönder..." className="bg-transparent w-full outline-none text-sm" />
                            </div>
                        </div>
                    </div>

                    {/* SUNUCU EKLEME MODALI */}
                    {modal === "create" && (
                        <div className="modal-overlay">
                            <div className="bg-[#313338] w-[440px] p-8 rounded-lg shadow-2xl relative">
                                <button onClick={() => setModal(null)} className="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">✕</button>
                                <h2 className="text-2xl font-bold text-center mb-2 text-white">Sunucunu Oluştur</h2>
                                <p className="text-gray-400 text-center text-sm mb-6">Sunucun, arkadaşlarınla takıldığın yerdir. Bir isim ver ve başla!</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-400 uppercase">Sunucu Adı</label>
                                        <input autoFocus className="w-full bg-[#1e1f22] p-3 rounded mt-2 outline-none focus:ring-2 ring-[#5865f2]" 
                                               value={inputVal} onChange={e => setInputVal(e.target.value)}
                                               placeholder="Kanka'nın Mekanı" />
                                    </div>
                                    <button onClick={handleCreateServer}
                                            className="w-full bg-[#5865f2] py-3 rounded font-bold hover:bg-[#4752c4] transition text-white">
                                        Oluştur
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === "login") return <div className="h-screen flex items-center justify-center bg-[#1e1f22] text-white">Giriş yapman lazım kanka...</div>;
            return <div className="h-screen flex items-center justify-center bg-[#1e1f22] text-[#5865f2] animate-pulse font-bold">TalkHub Yükleniyor...</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
