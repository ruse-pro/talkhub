<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TalkHub | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (Kütüphaneler) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- FIREBASE AYARLARI (Burayı kendi bilgilerine göre doldur kanka) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHub = () => {
            const [user, setUser] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [inputText, setInputText] = React.useState("");

            // 1. Hesap Açma / Giriş Yapma Fonksiyonu
            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider);
            };

            // 2. Kullanıcı Durumunu İzle
            React.useEffect(() => {
                auth.onAuthStateChanged(u => setUser(u));
            }, []);

            // 3. Mesajları Gerçek Zamanlı Çek (Firestore)
            React.useEffect(() => {
                const unsubscribe = db.collection("messages")
                    .orderBy("time", "asc")
                    .onSnapshot(snapshot => {
                        const msgData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setMessages(msgData);
                    });
                return () => unsubscribe();
            }, []);

            // 4. Mesaj Gönder
            const sendMessage = (e) => {
                if (e.key === 'Enter' && inputText.trim() !== "" && user) {
                    db.collection("messages").add({
                        text: inputText,
                        user: user.displayName,
                        photo: user.photoURL,
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputText("");
                }
            };

            if (!user) {
                return (
                    <div className="h-screen bg-[#36393f] flex items-center justify-center">
                        <div className="bg-[#2f3136] p-10 rounded-lg shadow-2xl text-center">
                            <h1 className="text-white text-3xl font-bold mb-6">TalkHub'a Hoş Geldin</h1>
                            <button onClick={login} className="bg-[#5865f2] text-white px-8 py-3 rounded font-bold hover:bg-[#4752c4] transition">
                                Google ile Giriş Yap ve Başla
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full bg-[#36393f] text-gray-100 overflow-hidden">
                    {/* Sunucu Listesi */}
                    <div className="w-[72px] bg-[#202225] flex flex-col items-center py-3 space-y-2">
                        <div className="w-12 h-12 bg-[#5865f2] rounded-xl flex items-center justify-center font-bold">TH</div>
                    </div>

                    {/* Kanal Listesi */}
                    <div className="w-60 bg-[#2f3136] flex flex-col">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 font-bold">TalkHub Sunucusu</div>
                        <div className="flex-1 p-3">
                            <div className="bg-[#393c43] px-2 py-1.5 rounded text-white flex items-center"># genel</div>
                        </div>
                        {/* Profil Paneli */}
                        <div className="bg-[#292b2f] p-2 flex items-center space-x-2">
                            <img src={user.photoURL} className="w-8 h-8 rounded-full" />
                            <div className="flex-1 overflow-hidden">
                                <p className="text-xs font-bold truncate">{user.displayName}</p>
                                <p className="text-[10px] text-gray-400 font-mono">#{user.uid.slice(0,4)}</p>
                            </div>
                            <button onClick={() => auth.signOut()} className="text-xs text-red-400 hover:underline">Çıkış</button>
                        </div>
                    </div>

                    {/* Chat Paneli */}
                    <div className="flex-1 flex flex-col">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 font-semibold shadow-sm"># genel</div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {messages.map(m => (
                                <div key={m.id} className="flex space-x-3 group">
                                    <img src={m.photo} className="w-10 h-10 rounded-full" />
                                    <div>
                                        <span className="font-bold text-white mr-2 hover:underline cursor-pointer">{m.user}</span>
                                        <p className="text-gray-300">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4">
                            <div className="bg-[#40444b] rounded-lg px-4 py-3 text-sm">
                                <input 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    onKeyDown={sendMessage}
                                    placeholder={`${user.displayName} olarak mesaj gönder...`} 
                                    className="bg-transparent w-full focus:outline-none"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
