<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Kasrga Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase & EmailJS Kütüphaneleri -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #36393f; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #202225; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- YAPILANDIRMA ---
        // EmailJS panelindeki Account -> Public Key'i buraya yapıştır kanka!
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [authState, setAuthState] = useState("loading"); // login, register, otp, main
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [otpInput, setOtpInput] = useState("");
            const [generatedCode, setGeneratedCode] = useState("");
            
            const [activeServer, setActiveServer] = useState("home");
            const [servers, setServers] = useState([]);
            const [messages, setMessages] = useState([]);
            const [inputMsg, setInputMsg] = useState("");

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    if (u) { setUser(u); setAuthState("main"); } 
                    else { setAuthState("login"); }
                });
            }, []);

            // E-POSTA KODU GÖNDER (Senin ID'lerinle)
            const sendVerificationEmail = (e) => {
                e.preventDefault();
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedCode(code);

                emailjs.send("service_lz0s5ir", "template_h4u1jp8", {
                    to_email: email,
                    code: code 
                }).then(() => {
                    setAuthState("otp");
                    alert("Onay kodu e-postana gönderildi!");
                }).catch(err => alert("Email hatası: " + err.text));
            };

            const finalizeSignUp = () => {
                if (otpInput === generatedCode) {
                    auth.createUserWithEmailAndPassword(email, pass)
                        .catch(err => alert("Kayıt hatası: " + err.message));
                } else {
                    alert("Kod yanlış!");
                }
            };

            // MESAJLARI DİNLE
            useEffect(() => {
                if (activeServer !== "home") {
                    const unsub = db.collection("chat").where("sid", "==", activeServer).orderBy("ts", "asc")
                        .onSnapshot(snap => setMessages(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                    return unsub;
                }
            }, [activeServer]);

            const handleSend = (e) => {
                if (e.key === "Enter" && inputMsg.trim()) {
                    db.collection("chat").add({
                        sid: activeServer,
                        text: inputMsg,
                        uName: user.email.split('@')[0],
                        ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputMsg("");
                }
            };

            // --- GÖRÜNÜMLER ---

            if (authState === "login" || authState === "register") return (
                <div className="h-screen flex items-center justify-center bg-[#2f3136]">
                    <div className="bg-[#36393f] p-10 rounded shadow-2xl w-96 border border-gray-800">
                        <h2 className="text-2xl font-bold text-center mb-6">{authState === "login" ? "Tekrar Hoş Geldin!" : "TalkHub'a Katıl"}</h2>
                        <form onSubmit={authState === "register" ? sendVerificationEmail : (e) => {e.preventDefault(); auth.signInWithEmailAndPassword(email, pass);}}>
                            <div className="space-y-4">
                                <input type="email" placeholder="E-posta" required className="w-full bg-[#202225] p-3 rounded outline-none focus:ring-1 ring-[#5865f2]" onChange={e => setEmail(e.target.value)} />
                                <input type="password" placeholder="Şifre" required className="w-full bg-[#202225] p-3 rounded outline-none focus:ring-1 ring-[#5865f2]" onChange={e => setPass(e.target.value)} />
                                <button type="submit" className="w-full bg-[#5865f2] py-3 rounded font-bold hover:bg-[#4752c4] transition">
                                    {authState === "login" ? "Giriş Yap" : "Kod Gönder"}
                                </button>
                            </div>
                        </form>
                        <p className="mt-4 text-center text-sm text-gray-400">
                            {authState === "login" ? "Hesabın yok mu?" : "Zaten üye misin?"}
                            <span className="text-[#00aff4] cursor-pointer ml-1" onClick={() => setAuthState(authState === "login" ? "register" : "login")}>Tıkla</span>
                        </p>
                    </div>
                </div>
            );

            if (authState === "otp") return (
                <div className="h-screen flex items-center justify-center bg-[#2f3136]">
                    <div className="bg-[#36393f] p-10 rounded text-center w-80">
                        <h2 className="text-xl font-bold mb-4">Kod Doğrulama</h2>
                        <p className="text-xs text-gray-400 mb-4">E-postana gelen 6 haneli kodu gir.</p>
                        <input type="text" maxLength="6" className="w-full bg-[#202225] p-4 text-center text-2xl tracking-[10px] rounded mb-6 outline-none" onChange={e => setOtpInput(e.target.value)} />
                        <button onClick={finalizeSignUp} className="w-full bg-[#3ec44f] py-3 rounded font-bold">Onayla ve Kaydol</button>
                    </div>
                </div>
            );

            if (authState === "main") return (
                <div className="flex h-screen w-full">
                    {/* SOL NAV */}
                    <div className="w-[72px] bg-[#202225] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setActiveServer("home")} className={`w-12 h-12 flex items-center justify-center cursor-pointer transition-all rounded-3xl ${activeServer === "home" ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f] hover:rounded-xl hover:bg-[#5865f2]"}`}>🏠</div>
                        <div className="w-8 h-[2px] bg-[#36393f] rounded-full mx-auto my-1"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveServer(s.id)} className={`w-12 h-12 flex items-center justify-center font-bold cursor-pointer transition-all rounded-3xl ${activeServer === s.id ? "bg-[#5865f2] rounded-xl" : "bg-[#36393f] hover:rounded-xl hover:bg-[#5865f2]"}`}>{s.name[0]}</div>
                        ))}
                        <button onClick={() => {const n = prompt("Sunucu Adı:"); if(n) setServers([...servers, {id: 's'+Date.now(), name: n}])}} className="w-12 h-12 bg-[#36393f] rounded-3xl text-[#3ec44f] hover:bg-[#3ec44f] hover:text-white hover:rounded-xl text-2xl">+</button>
                    </div>

                    {/* LİSTE & CHAT */}
                    <div className="flex-1 flex flex-col bg-[#2f3136]">
                        <div className="h-12 border-b border-[#26272b] flex items-center px-4 font-bold shadow-sm">
                            {activeServer === "home" ? "Ana Sayfa" : `# ${servers.find(x => x.id === activeServer)?.name}`}
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                            <div className="w-60 bg-[#2f3136] flex flex-col border-r border-[#26272b]">
                                <div className="flex-1 p-3 text-sm text-gray-400">
                                    {activeServer === "home" ? "Henüz arkadaşın yok." : "# genel-sohbet"}
                                </div>
                                <div className="bg-[#292b2f] p-3 flex justify-between items-center">
                                    <span className="text-xs font-bold truncate">{user?.email.split('@')[0]}</span>
                                    <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                                </div>
                            </div>
                            <div className="flex-1 flex flex-col bg-[#36393f]">
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {activeServer === "home" ? (
                                        <div className="h-full flex items-center justify-center italic text-gray-500 text-sm">Bir sunucu oluştur veya seç kanka.</div>
                                    ) : (
                                        messages.map(m => (
                                            <div key={m.id} className="flex flex-col">
                                                <span className="text-xs font-bold text-[#5865f2]">{m.uName}</span>
                                                <span className="text-sm text-gray-200">{m.text}</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {activeServer !== "home" && (
                                    <div className="p-4"><input value={inputMsg} onChange={e => setInputMsg(e.target.value)} onKeyDown={handleSend} placeholder="Mesaj gönder..." className="w-full bg-[#40444b] rounded p-3 outline-none shadow-inner" /></div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
