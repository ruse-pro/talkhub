<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#36393f] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // EmailJS Public Key'ini buraya yapıştır kanka!
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);

        const TalkHub = () => {
            const [step, setStep] = useState("kayit"); // kayit, otp, giris
            const [form, setForm] = useState({ email: "", pass: "", nick: "", user: "" });
            const [onayKodu, setOnayKodu] = useState("");
            const [girilenKod, setGirilenKod] = useState("");

            // KOD GÖNDERME
            const kodGonder = (e) => {
                e.preventDefault();
                const yeniKod = Math.floor(100000 + Math.random() * 900000).toString();
                setOnayKodu(yeniKod);

                // EmailJS'ye gönderilen veriler
                emailjs.send("service_lz0s5ir", "template_h4u1jp8", {
                    to_email: form.email,
                    code: yeniKod // Paneldeki {{code}} ile aynı olmalı
                }).then(() => {
                    setStep("otp");
                }).catch(err => alert("Hata: " + err.text));
            };

            // KAYDI TAMAMLA
            const kaydiBitir = async () => {
                if (girilenKod === onayKodu) {
                    try {
                        const res = await firebase.auth().createUserWithEmailAndPassword(form.email, form.pass);
                        await res.user.updateProfile({ displayName: form.nick });
                        await firebase.firestore().collection("users").doc(res.user.uid).set({
                            kullaniciAdi: form.user.toLowerCase(),
                            gorunenAd: form.nick,
                            email: form.email
                        });
                        alert("Hesabın başarıyla oluşturuldu kanka!");
                        location.reload(); 
                    } catch (err) { alert("Firebase Hatası: " + err.message); }
                } else {
                    alert("Girdiğin kod yanlış!");
                }
            };

            if (step === "kayit") return (
                <div className="h-screen flex items-center justify-center">
                    <form onSubmit={kodGonder} className="bg-[#2f3136] p-8 rounded-lg w-96 shadow-xl">
                        <h2 className="text-2xl font-bold text-center mb-6">TalkHub Kayıt</h2>
                        <input type="text" placeholder="Görünen Ad" className="w-full bg-[#202225] p-3 rounded mb-4 outline-none" onChange={e => setForm({...form, nick: e.target.value})} required />
                        <input type="text" placeholder="Kullanıcı Adı" className="w-full bg-[#202225] p-3 rounded mb-4 outline-none" onChange={e => setForm({...form, user: e.target.value})} required />
                        <input type="email" placeholder="E-posta" className="w-full bg-[#202225] p-3 rounded mb-4 outline-none" onChange={e => setForm({...form, email: e.target.value})} required />
                        <input type="password" placeholder="Şifre" className="w-full bg-[#202225] p-3 rounded mb-6 outline-none" onChange={e => setForm({...form, pass: e.target.value})} required />
                        <button type="submit" className="w-full bg-[#3ec44f] py-3 rounded font-bold">Kod Gönder</button>
                    </form>
                </div>
            );

            if (step === "otp") return (
                <div className="h-screen flex items-center justify-center">
                    <div className="bg-[#2f3136] p-8 rounded-lg text-center w-80">
                        <h2 className="text-xl font-bold mb-4">Kodu Onayla</h2>
                        <input type="text" maxLength="6" className="w-full bg-[#202225] p-3 text-center text-2xl tracking-widest rounded mb-6 outline-none border-2 border-[#5865f2]" onChange={e => setGirilenKod(e.target.value)} />
                        <button onClick={kaydiBitir} className="w-full bg-[#5865f2] py-3 rounded font-bold">Kaydı Tamamla</button>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHub />);
    </script>
</body>
</html>
