<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #1e1f22; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        .sidebar-icon { @apply w-12 h-12 rounded-[24px] bg-[#313338] text-[#23a559] flex items-center justify-center transition-all duration-300 hover:rounded-[15px] hover:bg-[#23a559] hover:text-white cursor-pointer mb-2; }
        .sidebar-icon.active { @apply rounded-[15px] bg-[#5865f2] text-white; }
        .modal-overlay { background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .input-field { @apply w-full bg-[#1e1f22] p-3 rounded-lg text-white outline-none border border-transparent focus:border-[#5865f2] mb-4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [isLogin, setIsLogin] = useState(true);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState("friends");
            const [servers, setServers] = useState([]);
            const [friendRequests, setRequests] = useState([]);
            const [modal, setModal] = useState(null);
            
            const [authForm, setAuthForm] = useState({ email: "", pass: "", nick: "" });
            const [targetNick, setTargetNick] = useState("");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        // Kullanıcı verisini ve İstekleri dinle
                        db.collection("users").doc(u.uid).onSnapshot(snap => {
                            if (snap.exists) setUserData(snap.data());
                        });

                        db.collection("requests").where("to", "==", u.uid).where("status", "==", "pending")
                          .onSnapshot(s => setRequests(s.docs.map(d => ({id: d.id, ...d.data()}))));

                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(s => setServers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    } else { setUser(null); }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleAuth = async () => {
                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(authForm.email, authForm.pass);
                    } else {
                        const res = await auth.createUserWithEmailAndPassword(authForm.email, authForm.pass);
                        await db.collection("users").doc(res.user.uid).set({
                            nickname: authForm.nick,
                            friends: [],
                            photo: "",
                            uid: res.user.uid
                        });
                    }
                } catch (e) { alert("Hata: " + e.message); }
            };

            const sendFriendRequest = async () => {
                const snap = await db.collection("users").where("nickname", "==", targetNick).get();
                if (snap.empty) return alert("Kullanıcı bulunamadı!");
                const targetUser = snap.docs[0].data();
                
                await db.collection("requests").add({
                    from: user.uid,
                    fromNick: userData.nickname,
                    to: targetUser.uid,
                    status: "pending"
                });
                alert("İstek gönderildi!");
                setModal(null);
            };

            const respondRequest = async (req, status) => {
                if (status === "accepted") {
                    await db.collection("users").doc(user.uid).update({
                        friends: firebase.firestore.FieldValue.arrayUnion(req.fromNick)
                    });
                    // Karşı tarafın listesine de ekle
                    await db.collection("users").doc(req.from).update({
                        friends: firebase.firestore.FieldValue.arrayUnion(userData.nickname)
                    });
                }
                await db.collection("requests").doc(req.id).delete();
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-[#5865f2] font-black italic">TALKHUB YÜKLENİYOR...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22]">
                    <div className="bg-[#313338] p-10 rounded-2xl w-[400px] shadow-2xl border border-white/5">
                        <h2 className="text-white text-2xl font-black mb-6 text-center">{isLogin ? "TEKRAR HOŞ GELDİN!" : "HESAP OLUŞTUR"}</h2>
                        {!isLogin && <input className="input-field" placeholder="Kullanıcı Adı" onChange={e => setAuthForm({...authForm, nick: e.target.value})} />}
                        <input className="input-field" placeholder="E-posta" onChange={e => setAuthForm({...authForm, email: e.target.value})} />
                        <input type="password" className="input-field" placeholder="Şifre" onChange={e => setAuthForm({...authForm, pass: e.target.value})} />
                        <button onClick={handleAuth} className="w-full bg-[#5865f2] py-3 rounded-lg font-bold text-white hover:bg-[#4752c4] mb-4">{isLogin ? "Giriş Yap" : "Kayıt Ol"}</button>
                        <p className="text-xs text-gray-400 text-center cursor-pointer hover:underline" onClick={() => setIsLogin(!isLogin)}>
                            {isLogin ? "Bir hesabın yok mu? Kayıt ol" : "Zaten bir hesabın var mı? Giriş yap"}
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 shrink-0">
                        <div onClick={() => setActiveTab("friends")} className={`sidebar-icon ${activeTab === "friends" ? "active" : ""}`}>👥</div>
                        <div className="w-8 h-[2px] bg-[#35363c] my-2"></div>
                        {servers.map(s => <div key={s.id} onClick={() => setActiveTab(s.id)} className={`sidebar-icon ${activeTab === s.id ? "active" : ""}`}>{s.name[0]}</div>)}
                        <div onClick={() => setModal("addServer")} className="sidebar-icon">+</div>
                    </div>

                    <div className="w-60 bg-[#2b2d31] flex flex-col shrink-0">
                        <div className="h-12 border-b border-black/20 flex items-center px-4 font-bold text-white">TalkHub</div>
                        <div className="flex-1 p-3 space-y-4">
                            <div className="text-xs font-bold text-gray-400 uppercase tracking-widest">Arkadaşlık</div>
                            <button onClick={() => setModal("addFriend")} className="w-full bg-[#248046] text-white text-[11px] font-bold py-2 rounded uppercase">Arkadaş Ekle</button>
                            
                            {friendRequests.length > 0 && (
                                <div className="space-y-2">
                                    <div className="text-[10px] font-black text-orange-400 uppercase tracking-widest">Bekleyen İstekler</div>
                                    {friendRequests.map(r => (
                                        <div key={r.id} className="bg-[#1e1f22] p-2 rounded-lg text-xs">
                                            <div className="text-white font-bold mb-2">{r.fromNick}</div>
                                            <div className="flex space-x-2">
                                                <button onClick={() => respondRequest(r, "accepted")} className="flex-1 bg-green-600 rounded py-1">✅</button>
                                                <button onClick={() => respondRequest(r, "rejected")} className="flex-1 bg-red-600 rounded py-1">❌</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="text-xs font-bold text-gray-400 uppercase tracking-widest pt-4">Arkadaşlar</div>
                            {userData?.friends?.map(f => (
                                <div key={f} className="flex items-center space-x-2 p-2 hover:bg-[#35373c] rounded-lg text-sm text-gray-300">
                                    <div className="w-6 h-6 rounded-full bg-[#5865f2]"></div>
                                    <span>{f}</span>
                                </div>
                            ))}
                        </div>
                        <div className="bg-[#232428] p-2 flex items-center justify-between">
                            <div className="flex items-center space-x-2 overflow-hidden">
                                <div className="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center text-[10px] text-white font-bold">TH</div>
                                <span className="text-xs font-bold text-white truncate">{userData?.nickname}</span>
                            </div>
                            <span className="text-gray-400 cursor-pointer" onClick={() => auth.signOut()}>🚪</span>
                        </div>
                    </div>

                    <div className="flex-1 bg-[#313338] flex flex-col items-center justify-center text-center">
                        <h2 className="text-gray-500 text-3xl font-black opacity-20 uppercase italic">TalkHub Network</h2>
                        <p className="text-gray-600 text-sm mt-2">Sohbet etmek için bir sunucu veya arkadaş seç.</p>
                    </div>

                    {modal === "addFriend" && (
                        <div className="modal-overlay" onClick={() => setModal(null)}>
                            <div className="bg-[#313338] p-8 rounded-xl w-96 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-white font-bold mb-4">Arkadaşlık İsteği Gönder</h3>
                                <input className="input-field" placeholder="Kullanıcı Adı" onChange={e => setTargetNick(e.target.value)} />
                                <button onClick={sendFriendRequest} className="w-full bg-[#5865f2] py-2 rounded font-bold text-white">İstek Gönder</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
