<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkHub | Sohbet Et!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- EmailJS Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; overflow: hidden; }
        .sidebar-btn { @apply w-12 h-12 bg-[#313338] text-[#23a559] rounded-3xl cursor-pointer flex items-center justify-center transition-all duration-200 hover:rounded-xl hover:bg-[#5865f2] hover:text-white relative; }
        .sidebar-btn.active { @apply rounded-xl bg-[#5865f2] text-white; }
        .sidebar-btn.active::before { content: ""; position: absolute; left: -12px; height: 35px; width: 4px; background: white; border-radius: 0 4px 4px 0; }
        .th-badge { background: #5865f2; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BURAYA SENİN PUBLIC KEY'İN GELECEK ---
        emailjs.init("FdTOZL7AMRiGdirp-"); 

        const firebaseConfig = {
            apiKey: "AIzaSyAI8lNtiULLzVrI7Z42k0YhuHbXAsMKRy8",
            authDomain: "talkhub-52bcc.firebaseapp.com",
            projectId: "talkhub-52bcc",
            storageBucket: "talkhub-52bcc.firebasestorage.app",
            messagingSenderId: "82126174871",
            appId: "1:82126174871:web:b6a08ea6903eb13b1d47d2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TalkHubApp = () => {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [isLogin, setIsLogin] = useState(true);
            const [activeTab, setActiveTab] = useState("dm");
            const [servers, setServers] = useState([]);
            const [modal, setModal] = useState(null);

            const ADMIN_EMAIL = "talkhubofficiall@gmail.com";

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if(u) {
                        db.collection("servers").where("members", "array-contains", u.uid)
                          .onSnapshot(s => setServers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    }
                });
            }, []);

            const handleAuth = async () => {
                try {
                    if(isLogin) {
                        await auth.signInWithEmailAndPassword(email, pass);
                    } else {
                        const res = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(res.user.uid).set({
                            nickname: email.split('@')[0],
                            username: email.split('@')[0],
                            email: email
                        });
                        // Kayıt olunca sana mail gelsin istersen buraya emailjs.send eklenebilir
                    }
                } catch (e) { alert("Kanka hata: " + e.message); }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1e1f22]">
                    <div className="bg-[#313338] p-8 rounded-lg shadow-xl w-96 text-center">
                        <h2 className="text-2xl font-bold mb-6">TalkHub'a Gir</h2>
                        <input className="w-full bg-[#1e1f22] p-2 rounded mb-4 outline-none" placeholder="E-Posta" onChange={e=>setEmail(e.target.value)} />
                        <input type="password" className="w-full bg-[#1e1f22] p-2 rounded mb-4 outline-none" placeholder="Şifre" onChange={e=>setPass(e.target.value)} />
                        <button onClick={handleAuth} className="w-full bg-[#5865f2] py-2 rounded font-bold">{isLogin ? "Giriş Yap" : "Kayıt Ol"}</button>
                        <p className="text-xs mt-4 text-gray-400 cursor-pointer" onClick={()=>setIsLogin(!isLogin)}>
                            {isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap"}
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2">
                        <div onClick={() => setActiveTab("dm")} className={`sidebar-btn font-bold text-[10px] ${activeTab === "dm" ? "active" : ""}`}>DM</div>
                        <div className="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
                        {servers.map(s => (
                            <div key={s.id} onClick={() => setActiveTab(s.id)} className={`sidebar-btn font-bold ${activeTab === s.id ? "active" : ""}`}>
                                {s.name[0].toUpperCase()}
                            </div>
                        ))}
                        <div className="sidebar-btn text-2xl text-[#23a559] hover:bg-[#23a559] hover:text-white" onClick={() => alert("Sunucu oluşturma aktif kanka!")}>+</div>
                        {user.email === ADMIN_EMAIL && (
                            <div className="sidebar-btn text-xl text-yellow-500" title="Admin Paneli">👑</div>
                        )}
                    </div>

                    <div className="flex-1 flex bg-[#2b2d31]">
                        <div className="w-60 bg-[#2b2d31] flex flex-col border-r border-black/10">
                            <div className="h-12 flex items-center px-4 font-bold border-b border-black/10">
                                {activeTab === "dm" ? "Direkt Mesajlar" : "Sunucu Kanalları"}
                            </div>
                            <div className="flex-1 p-4 text-gray-500 italic text-sm">
                                TalkHub Hoş Geldin!
                            </div>
                            <div className="bg-[#232428] p-2 flex items-center justify-between">
                                <div className="flex items-center space-x-2">
                                    <div className="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center font-bold">TH</div>
                                    <span className="text-xs font-bold truncate w-20">{user.email.split('@')[0]}</span>
                                    {user.email === ADMIN_EMAIL && <span className="th-badge">TH</span>}
                                </div>
                                <button onClick={() => auth.signOut()} className="text-[10px] text-red-400">Çıkış</button>
                            </div>
                        </div>
                        <div className="flex-1 bg-[#313338] flex flex-col items-center justify-center opacity-30 italic">
                             Sohebete başlamak için bir yer seç kanka!
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TalkHubApp />);
    </script>
</body>
</html>
